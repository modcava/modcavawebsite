services:
  mysql:
    image: mysql:8.0
    container_name: mocava_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mocava}
      MYSQL_USER: ${MYSQL_USER:-mocava_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mocava_pass}
    ports:
      - "3306:3306"
    volumes:
      - mocava_mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      timeout: 20s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: mocava_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - mysql

volumes:
  mocava_mysql_data:
